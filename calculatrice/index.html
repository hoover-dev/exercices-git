<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculatrice</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    .calc {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      width: 280px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    #ecran {
      background: #0f3460;
      color: white;
      font-size: 2rem;
      text-align: right;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      min-height: 60px;
      word-break: break-all;
    }
    .boutons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    button {
      padding: 18px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.8; }
    .btn-num    { background: #e94560; color: white; }
    .btn-op     { background: #0f3460; color: white; }
    .btn-equal  { background: #e94560; color: white; grid-column: span 2; }
    .btn-clear  { background: #533483; color: white; grid-column: span 2; }
  </style>
</head>
<body>
<div class="calc">
  <div id="ecran">0</div>
  <div class="boutons">
    <button class="btn-clear" onclick="effacer()">AC</button>
    <button class="btn-op" onclick="ajouter('%')">%</button>
    <button class="btn-op" onclick="ajouter('/')">÷</button>
    <button class="btn-num" onclick="ajouter('7')">7</button>
    <button class="btn-num" onclick="ajouter('8')">8</button>
    <button class="btn-num" onclick="ajouter('9')">9</button>
    <button class="btn-op" onclick="ajouter('*')">×</button>
    <button class="btn-num" onclick="ajouter('4')">4</button>
    <button class="btn-num" onclick="ajouter('5')">5</button>
    <button class="btn-num" onclick="ajouter('6')">6</button>
    <button class="btn-op" onclick="ajouter('-')">−</button>
    <button class="btn-num" onclick="ajouter('1')">1</button>
    <button class="btn-num" onclick="ajouter('2')">2</button>
    <button class="btn-num" onclick="ajouter('3')">3</button>
    <button class="btn-op" onclick="ajouter('+')">+</button>
    <button class="btn-num" onclick="ajouter('0')">0</button>
    <button class="btn-num" onclick="ajouter('.')">.</button>
    <button class="btn-equal" onclick="calculer()">=</button>
  </div>
</div>

<script>
  let expression = "";

  function ajouter(valeur) {
    if (expression === "0") expression = "";
    expression += valeur;
    document.getElementById("ecran").innerHTML = expression;
  }

  function calculer() {
    try {
      expression = String(eval(expression));
      document.getElementById("ecran").innerHTML = expression;
    } catch {
      document.getElementById("ecran").innerHTML = "Erreur";
      expression = "";
    }
  }

  function effacer() {
    expression = "";
    document.getElementById("ecran").innerHTML = "0";
  }
</script>
</body>
</html>
